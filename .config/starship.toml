# ~/.config/starship.toml

# Specify the palette to use
palette = "ayu-dark"

# Define the custom palette colors
[palettes.ayu-dark]
black   = "#0f1419"
base    = "#14191f"
surface = "#191e2a"
overlay = "#242936"
muted   = "#3e4b59"
subtle  = "#5c6773"
text    = "#e6b450" 
fg      = "#f07178" 
red     = "#ff3333"
orange  = "#ff7733"
yellow  = "#e6b450"
green   = "#7fd962"
cyan    = "#95e6cb"
blue    = "#39bae6"
purple  = "#f29718"
magenta = "#f07178"

# Settings for modules
[cmd_duration]
disabled = true

[time]
disabled = true

[character]
# Here, "green" and "red" refer to the keys defined in [palettes.flexoki-dark]
success_symbol = "[ŌØ»](bold green)"
error_symbol = "[ŌØ»](bold red)"

# Example: If you want to use other colors from your palette elsewhere:
[directory]
style = "bold italic orange"
format = "[$path](bold italic orange)[$read_only]($read_only_style) "
truncation_length = 3
truncation_symbol = "ŌĆ”/"
read_only = " ’ĆŻ"
read_only_style = "bold yellow"
truncate_to_repo = true

[aws]
symbol = "ŅīĮ  "

[conda]
symbol = "’äī "

[dart]
