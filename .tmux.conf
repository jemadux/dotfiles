# ============================================================
#  Flexoki Dark — Official Palette tmux configuration
#  https://stephango.com/flexoki
# ============================================================

# Flexoki Dark Palette Colors
# bg: #100f0f | bg-2: #1c1b1a | ui: #343331 | tx: #cecdc3
# re: #af3029 | or: #bc5215 | ye: #ad8301 | gr: #66800b
# cy: #24837b | bl: #205ea6 | pu: #5e409d | ma: #a02f6f

# ============================================================
#  General Settings
# ============================================================
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 10
set -g focus-events on

# ============================================================
#  Status Bar
# ============================================================
set -g status on
set -g status-interval 5
set -g status-position top 
set -g status-justify left

# Main Status Style (bg-2 and tx-2)
set -g status-style "bg=#1c1b1a,fg=#878580"

# Left: Session Name (Flexoki Blue)
set -g status-left-length 50
set -g status-left "#[bg=#205ea6,fg=#100f0f,bold] #S #[bg=#1c1b1a,fg=#205ea6] "

# Right: Date/Time & Host
set -g status-right-length 100
set -g status-right "#[fg=#403e3c]#[bg=#1c1b1a,fg=#878580] %Y-%m-%d #[fg=#575653]·#[fg=#cecdc3] %H:%M #[bg=#343331,fg=#cecdc3,bold] #h "

# ============================================================
#  Window Tabs
# ============================================================

# Inactive Windows (bg-2 and tx-3)
set -g window-status-format " #[fg=#575653]#I #[fg=#878580]#W#{?window_zoomed_flag, #[fg=#ad8301]Z,} "
set -g window-status-separator ""

# Active Window (ui background, tx foreground)
set -g window-status-current-format "#[bg=#343331,fg=#cecdc3,bold] #I #W#{?window_zoomed_flag, #[fg=#ad8301]Z,} "

# Alerts (Yellow for Activity, Red for Bell)
set -g window-status-activity-style "bg=#1c1b1a,fg=#ad8301"
set -g window-status-bell-style     "bg=#1c1b1a,fg=#af3029,bold"

# ============================================================
#  Pane Borders & Selection
# ============================================================

# Border Colors
set -g pane-border-style        "fg=#343331"
set -g pane-active-border-style "fg=#205ea6"

# Copy Mode / Selection (Flexoki Blue background)
set -g mode-style "bg=#205ea6,fg=#cecdc3"

# Message/Command line
set -g message-style         "bg=#343331,fg=#cecdc3"
set -g message-command-style "bg=#343331,fg=#66800b"

# ============================================================
#  Key Bindings (Standardized)
# ============================================================

# Reload config
bind r source-file ~/.tmux.conf \; display-message "Flexoki Theme Reloaded!"

# Improved Splits
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Vim-style Pane Navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vi Mode for Copying
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
# set pprefix to M+a 
set -g prefix M-a
unbind C-b
bind M-a send-prefix
