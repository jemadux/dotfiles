# ============================================================
#  Ayu Dark — Official Palette tmux configuration
#  https://github.com/ayu-theme/ayu-colors
# ============================================================

# ============================================================
#  General Settings
# ============================================================
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 10
set -g focus-events on

# ============================================================
#  Status Bar & Palette definitions
# ============================================================
set -g status on
set -g status-interval 5
set -g status-position top 
set -g status-justify left

# Ayu Dark Core Palette
ayu_bg="#0D1017"
ayu_panel="#11151C"
ayu_ui="#161B22"
ayu_ui_active="#242930"
ayu_comment="#626D7A"
ayu_fg="#BFBDB6"
ayu_fg_muted="#565B66"

# Ayu Dark Accent Colors
ayu_red="#F07178"
ayu_orange="#FF8F40"
ayu_yellow="#E6B450"
ayu_green="#AAD94C"
ayu_cyan="#95E6CB"
ayu_blue="#59C2FF"
ayu_purple="#D2A6FF"
ayu_magenta="#F29668"

# Theme semantic mapping
color_tx_1=$ayu_fg
color_tx_2=$ayu_comment
color_tx_3=$ayu_fg_muted
color_bg_1=$ayu_bg
color_bg_2=$ayu_panel
color_ui_1=$ayu_ui
color_ui_2=$ayu_ui_active
color_ui_3=$ayu_comment

color_red=$ayu_red
color_orange=$ayu_orange
color_yellow=$ayu_yellow
color_green=$ayu_green
color_cyan=$ayu_cyan
color_blue=$ayu_blue
color_purple=$ayu_purple
color_magenta=$ayu_magenta

# status
set -g status "on"
set -g status-bg $color_bg_2
set -g status-justify "left"
set -g status-left-length "100"
set -g status-right-length "100"

# messages
set -g message-style "fg=$color_tx_1,bg=$color_bg_2,align=centre"
set -g message-command-style "fg=$color_tx_1,bg=$color_ui_2,align=centre"

# panes
set -g pane-border-style fg=$color_ui_2
set -g pane-active-border-style fg=$color_blue

# windows
setw -g window-status-activity-style fg=$color_tx_1,bg=$color_bg_1,none
setw -g window-status-separator ""
setw -g window-status-style fg=$color_tx_1,bg=$color_bg_1,none

# statusline
set -g status-left "#{?client_prefix,#[fg=#$color_bg_1#,bg=#$color_red],#[fg=#$color_bg_1#,bg=#$color_green]}  #S "
set -g status-right "#[fg=#$color_bg_1,bg=#$color_orange]  #{b:pane_current_path} #[fg=#$color_bg_1,bg=#$color_purple]  %Y-%m-%d %H:%M "

# window-status
setw -g window-status-format "#[bg=#$color_bg_2,fg=#$color_tx_2] #I  #W "
setw -g window-status-current-format "#[bg=#$color_bg_1,fg=#$color_tx_1] #I  #W "

# Modes
setw -g clock-mode-colour $color_blue
setw -g mode-style fg=$color_orange,bg=$color_ui_2,bold

# Reload config
bind r source-file ~/.tmux.conf \; display-message "Ayu Dark Theme Reloaded!"

# Improved Splits
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Vim-style Pane Navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vi Mode for Copying
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Set prefix to Alt + a
set -g prefix M-a
unbind C-b
bind M-a send-prefix
