# ~/.tmux.conf

# ── Quality of life ──────────────────────────────────────────
set -g mouse on
set -g history-limit 100000
set -g escape-time 0
set -g renumber-windows on
set -g base-index 1
setw -g pane-base-index 1
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"   # true color passthrough

# ── Prefix: Ctrl-a ───────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── Reload config ────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display '~/.tmux.conf reloaded'

# ── Splits in current dir ────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ── Pane navigation (no prefix) ──────────────────────────────
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# ── Vi copy mode ─────────────────────────────────────────────
setw -g mode-keys vi

# ── Ayu Dark colors ──────────────────────────────────────────
#   bg       #0D1017
#   bg2      #131721
#   fg       #BFBDB6
#   accent   #E6B450   (orange/gold)
#   blue     #39BAE6
#   gray     #3D424D

# Status bar
set -g status-position top
set -g status-style "bg=#131721 fg=#BFBDB6"

# Left: session name
set -g status-left "#[bg=#E6B450 fg=#0D1017 bold] #S #[bg=#131721 fg=#E6B450]"
set -g status-left-length 30

# Right: time & date
set -g status-right "#[fg=#3D424D]#[bg=#3D424D fg=#BFBDB6] %H:%M  %d %b #[bg=#3D424D fg=#E6B450]#[bg=#E6B450 fg=#0D1017 bold] #h "
set -g status-right-length 50

# Window tabs
set -g window-status-format         "#[fg=#3D424D] #I #[fg=#BFBDB6]#W "
set -g window-status-current-format "#[fg=#131721 bg=#39BAE6] #I #[fg=#0D1017 bold]#W "
set -g window-status-separator      ""

# Pane borders
set -g pane-border-style        "fg=#3D424D"
set -g pane-active-border-style "fg=#E6B450"

# Copy mode highlight
set -g mode-style "bg=#E6B450 fg=#0D1017"

# Message bar (prefix + :)
set -g message-style "bg=#E6B450 fg=#0D1017 bold"

